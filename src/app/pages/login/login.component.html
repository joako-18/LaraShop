<div class="login-container">
  <div class="login-card">
    
    <div class="login-header">
      <div class="logo-wrapper">
        <img src="assets/logo-blanco.png" alt="Logo" class="main-logo">
      </div>
      <h1 class="title-welcome">BIENVENIDO</h1>
      <p class="subtitle-shop">LARA SHOP</p>
    </div>

    <form class="login-form">
      <div class="input-group">
        <label for="correo">Correo:</label>
        <input type="email" id="correo" name="correo">
      </div>

      <div class="input-group">
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password">
      </div>

      <div class="button-area">
        <button type="button" class="login-button" (click)="navigateTo('/dashboard')">INGRESAR</button>
      </div>
    </form>

  </div>
</div>

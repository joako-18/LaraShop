<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-wrapper">
        <img src="assets/logo-blanco.png" alt="Logo" class="main-logo">
      </div>
      <h1 class="title-welcome">BIENVENIDO</h1>
      <p class="subtitle-shop">LARA SHOP</p>
    </div>
    <form class="login-form" (ngSubmit)="ingresar()">
      <div class="input-group">
        <label for="correo">Correo:</label>
        <input
          type="email"
          id="correo"
          name="correo"
          [(ngModel)]="correo"
          autocomplete="email">
      </div>
      <div class="input-group">
        <label for="password">Contraseña:</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="contrasena"
          autocomplete="current-password">
      </div>

      @if (errorMsg) {
        <p class="error-msg">{{ errorMsg }}</p>
      }

      <div class="button-area">
        <button type="submit" class="login-button" [disabled]="cargando">
          {{ cargando ? 'INGRESANDO...' : 'INGRESAR' }}
        </button>
      </div>
    </form>
  </div>
</div>

@if (isOpen) {
  <div class="modal-overlay">
    <div class="modal-box">
      <h2 class="modal-title">
        APERTURA DE CAJA
        <br>
        <span class="modal-date">{{ fechaHoy }}</span>
      </h2>

      <p class="modal-desc">
        Para comenzar a vender debes registrar el monto inicial en caja.
      </p>

      @if (cargando) {
        <p class="hint-text">Cargando monto sugerido...</p>
      }

      @if (!cargando && montoSugerido > 0) {
        <div class="sugerido-box">
          <span>Fondo del día anterior:</span>
          <strong>${{ montoSugerido.toFixed(2) }}</strong>
          <button class="btn-usar" (click)="usarSugerido()">Usar este monto</button>
        </div>
      }

      <div class="form-group">
        <label>Monto inicial en caja:</label>
        <input
          type="number"
          class="modal-input"
          [(ngModel)]="montoApertura"
          placeholder="$0.00"
          min="0"
          step="0.01">
      </div>

      @if (errorMsg) {
        <p class="error-msg">{{ errorMsg }}</p>
      }

      <div class="modal-actions">
        <button
          class="btn-registrar"
          (click)="registrar()"
          [disabled]="guardando || cargando">
          {{ guardando ? 'Registrando...' : 'Registrar Apertura' }}
        </button>
      </div>
    </div>
  </div>
}
